databases:
  - name: plant-management-db
    plan: free
    databaseName: plant_management

services:
  - type: web
    name: plant-management
    plan: free
    runtime: node
    buildCommand: cd backend && npm install && cd ../frontend && npm install && cd .. && npm run build
    startCommand: cd backend && node dist/index.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: plant-management-db
          property: connectionString
      - key: NODE_ENV
        value: production
